<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mertcan Koca - Matematik Proje Ödevi</title>
    <style>
        /* ─── Reset & Base ─────────────────────────────────────────── */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #5b8a1c;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            user-select: none;
        }

        /* ─── Credits ───────────────────────────────────────────────── */
        #credits {
            position: fixed;
            bottom: 10px; right: 15px;
            background: rgba(0,0,0,0.6);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            border: 1px solid #f1c40f;
            color: #f1c40f;
            z-index: 1000;
        }

        /* ─── Screens ───────────────────────────────────────────────── */
        .screen {
            width: 100%;
            max-width: 1100px;
            display: none;
            flex-direction: column;
            align-items: center;
        }
        .screen.active { display: flex; }

        /* ─── Start Screen ──────────────────────────────────────────── */
        #start-screen {
            background: rgba(0,0,0,0.8);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid #27ae60;
        }

        #start-screen h1 {
            color: #f1c40f;
            font-size: 45px;
            margin-bottom: 20px;
        }

        .settings-group { margin: 15px 0; }
        .settings-group h2 { margin-bottom: 10px; }

        .settings-group button {
            background: #34495e;
            color: white;
            border: 2px solid #7f8c8d;
            padding: 12px 25px;
            font-size: 20px;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
            transition: 0.3s;
        }
        .settings-group button.selected {
            background: #e67e22;
            border-color: white;
            transform: scale(1.1);
        }

        #start-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 30px;
        }

        /* ─── Game Screen ───────────────────────────────────────────── */
        #status-bar {
            background: #c0392b;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 22px;
            font-weight: bold;
            width: 90%;
            text-align: center;
            margin-bottom: 20px;
        }

        .game-container {
            display: flex;
            justify-content: space-between;
            width: 100%;
            gap: 40px;
        }

        /* ─── Team Panels ───────────────────────────────────────────── */
        .team-panel {
            flex: 1;
            text-align: center;
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 15px;
            border: 2px solid transparent;
            transition: 0.4s;
        }
        .team-panel h2 { margin-bottom: 10px; }
        .team-panel.blurred { filter: blur(25px); pointer-events: none; opacity: 0.3; }
        .team-panel.active  { border-color: #f1c40f; background: rgba(0,0,0,0.4); transform: scale(1.02); }

        /* ─── Bottle Grid ───────────────────────────────────────────── */
        .bottle-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .bottle {
            background: #b30000;
            color: white;
            font-size: 22px;
            padding: 15px 0;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 0 4px 0 #7b0000;
            transition: 0.2s;
        }
        .bottle.poison-placed  { background: #27ae60; border: 2px solid white; box-shadow: 0 4px 0 #1e7e45; }
        .bottle.safe-revealed  { background: #3498db; cursor: not-allowed; box-shadow: 0 4px 0 #217dbb; }
        .bottle.poison-revealed { background: #f1c40f; color: black; font-weight: bold; cursor: not-allowed; box-shadow: 0 4px 0 #c29d0b; }

        /* ─── Confirm Button ────────────────────────────────────────── */
        .confirm-btn {
            background: #27ae60;
            color: white;
            font-size: 20px;
            font-weight: bold;
            padding: 12px;
            width: 100%;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .confirm-btn:disabled { background: #7f8c8d; cursor: not-allowed; opacity: 0.5; }

        /* ─── Question Overlay ──────────────────────────────────────── */
        #question-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        #timer-display {
            font-size: 80px;
            color: #e74c3c;
            font-weight: bold;
        }

        #question-text {
            padding: 20px;
            font-size: 26px;
            text-align: center;
            max-width: 700px;
        }

        #choices-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 80%;
            max-width: 500px;
            margin-top: 20px;
        }

        #choices-grid button {
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            background: #3498db;
            color: white;
        }

        /* ─── End Overlay ───────────────────────────────────────────── */
        #end-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            text-align: center;
        }

        #end-overlay h1 { font-size: 60px; margin-bottom: 20px; }
        #end-overlay p  { font-size: 24px; margin-bottom: 30px; }

        #end-overlay button {
            padding: 15px 40px;
            font-size: 20px;
            cursor: pointer;
            border-radius: 10px;
            border: none;
        }
    </style>
</head>
<body>

<div id="credits">Mertcan Koca 10/B Matematik Proje Ödevi</div>

<!-- ─── Start Screen ──────────────────────────────────────────────── -->
<div id="start-screen" class="screen active">
    <h1>Matematik Şişe Düellosu</h1>

    <div class="settings-group">
        <h2>Zehir Sayısı</h2>
        <button onclick="Settings.setPoison(5, this)">5</button>
        <button onclick="Settings.setPoison(10, this)">10</button>
        <button onclick="Settings.setPoison(15, this)">15</button>
    </div>

    <div class="settings-group">
        <h2>Soru Süresi</h2>
        <button onclick="Settings.setTime(30, this)">30s</button>
        <button onclick="Settings.setTime(45, this)">45s</button>
        <button onclick="Settings.setTime(60, this)">60s</button>
    </div>

    <button id="start-btn" onclick="Game.init()">KURULUMA BAŞLA</button>
</div>

<!-- ─── Game Screen ───────────────────────────────────────────────── -->
<div id="game-screen" class="screen">
    <div id="status-bar">YÜKLENİYOR...</div>
    <div class="game-container">
        <div id="panel-t1" class="team-panel">
            <h2>1. TAKIM</h2>
            <div class="bottle-grid" id="grid-t1"></div>
            <button id="confirm-t1" class="confirm-btn" onclick="Game.confirmSetup()">SEÇİMLERİ ONAYLA</button>
        </div>
        <div id="panel-t2" class="team-panel">
            <h2>2. TAKIM</h2>
            <div class="bottle-grid" id="grid-t2"></div>
            <button id="confirm-t2" class="confirm-btn" onclick="Game.confirmSetup()">SEÇİMLERİ ONAYLA</button>
        </div>
    </div>
</div>

<!-- ─── Question Overlay ──────────────────────────────────────────── -->
<div id="question-overlay">
    <div id="timer-display">60</div>
    <div id="question-text">Soru...</div>
    <div id="choices-grid"></div>
</div>

<!-- ─── End Overlay ───────────────────────────────────────────────── -->
<div id="end-overlay">
    <h1>OYUN BİTTİ</h1>
    <p id="end-message"></p>
    <button onclick="location.reload()">TEKRAR OYNA</button>
</div>

<script>

/* ═══════════════════════════════════════════════════════════════════
   SETTINGS MODULE
   Stores the poison count and question time chosen on the start screen.
═══════════════════════════════════════════════════════════════════ */
const Settings = (() => {
    let poisonCount  = 0;
    let questionTime = 0;

    function _highlightBtn(btn) {
        btn.parentElement.querySelectorAll('button')
           .forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
    }

    function setPoison(val, btn) { poisonCount  = val; _highlightBtn(btn); }
    function setTime(val, btn)   { questionTime = val; _highlightBtn(btn); }
    function get()     { return { poisonCount, questionTime }; }
    function isReady() { return poisonCount > 0 && questionTime > 0; }

    return { setPoison, setTime, get, isReady };
})();


/* ═══════════════════════════════════════════════════════════════════
   QUESTIONS MODULE
   Defines all question types. Each has a generate() that returns
   { text, answer }. buildChoices() creates 4 shuffled options.
═══════════════════════════════════════════════════════════════════ */
const Questions = (() => {
    function rnd(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    const types = [
        {
            // Word problem: calorie burn
            generate() {
                const a = rnd(10, 40), b = rnd(2, 9);
                return {
                    text: `Bir mirket saatte ${a} kalori harcıyor. ${b} saat dans ederse kaç kalori yakar?`,
                    answer: a * b
                };
            }
        },
        {
            // Word problem: robot steps
            generate() {
                const a = rnd(5, 15), b = rnd(10, 20), c = rnd(5, 20);
                return {
                    text: `Bir robot saniyede ${a} adım atıyor. ${b} saniye sonra ${c} adım geri kayarsa kaç adım ilerler?`,
                    answer: (a * b) - c
                };
            }
        },
        {
            // Word problem: spaceship fuel
            generate() {
                const a = rnd(100, 200), b = rnd(5, 10), c = rnd(5, 15);
                return {
                    text: `Uzay gemisi ${a} L yakıtla kalkıyor. Her km'de ${b} L ekleniyor. ${c} km sonra kaç L olur?`,
                    answer: a + (b * c)
                };
            }
        },
        {
            // Pure arithmetic: sum of 4 large numbers (e.g. 502+852+592+582=?)
            generate() {
                const a = rnd(101, 999), b = rnd(101, 999),
                      c = rnd(101, 999), d = rnd(101, 999);
                return {
                    text: `${a}+${b}+${c}+${d}=?`,
                    answer: a + b + c + d
                };
            }
        },
        {
            // Pure arithmetic: two large numbers added, one subtracted (e.g. 503+731-581=?)
            generate() {
                const a = rnd(101, 999), b = rnd(101, 999), c = rnd(101, 999);
                return {
                    text: `${a}+${b}-${c}=?`,
                    answer: a + b - c
                };
            }
        }
    ];

    function getRandom() {
        return types[Math.floor(Math.random() * types.length)].generate();
    }

    function buildChoices(correct) {
        const set = new Set([correct]);
        while (set.size < 4) {
            const candidate = correct + Math.floor(Math.random() * 40) - 20;
            if (candidate !== correct) set.add(candidate);
        }
        return [...set].sort(() => Math.random() - 0.5);
    }

    return { getRandom, buildChoices };
})();


/* ═══════════════════════════════════════════════════════════════════
   UI MODULE
   All DOM reads and writes live here. No game logic.
═══════════════════════════════════════════════════════════════════ */
const UI = (() => {
    const el = {
        startScreen:      document.getElementById('start-screen'),
        gameScreen:       document.getElementById('game-screen'),
        questionOverlay:  document.getElementById('question-overlay'),
        endOverlay:       document.getElementById('end-overlay'),
        statusBar:        document.getElementById('status-bar'),
        timerDisplay:     document.getElementById('timer-display'),
        questionText:     document.getElementById('question-text'),
        choicesGrid:      document.getElementById('choices-grid'),
        endMessage:       document.getElementById('end-message'),
        panelT1:          document.getElementById('panel-t1'),
        panelT2:          document.getElementById('panel-t2'),
        gridT1:           document.getElementById('grid-t1'),
        gridT2:           document.getElementById('grid-t2'),
        confirmT1:        document.getElementById('confirm-t1'),
        confirmT2:        document.getElementById('confirm-t2'),
    };

    function showGameScreen() {
        el.startScreen.classList.remove('active');
        el.gameScreen.classList.add('active');
    }

    function showOverlay(name) {
        (name === 'question' ? el.questionOverlay : el.endOverlay).style.display = 'flex';
    }

    function hideOverlay(name) {
        (name === 'question' ? el.questionOverlay : el.endOverlay).style.display = '';
    }

    function setStatus(text, color = '#c0392b') {
        el.statusBar.innerText  = text;
        el.statusBar.style.background = color;
    }

    function setTimer(val)    { el.timerDisplay.innerText  = val; }
    function setQuestion(txt) { el.questionText.innerText  = txt; }
    function setEndMessage(m) { el.endMessage.innerText    = m;   }

    function renderChoices(choices, onPick) {
        el.choicesGrid.innerHTML = '';
        choices.forEach(val => {
            const btn = document.createElement('button');
            btn.innerText = val;
            btn.onclick   = () => onPick(val);
            el.choicesGrid.appendChild(btn);
        });
    }

    function renderBottleGrid(teamKey, bottles, editable, showPoisonHighlight) {
        const grid = el['grid' + teamKey.charAt(0).toUpperCase() + teamKey.slice(1)];
        grid.innerHTML = '';
        bottles.forEach(bottle => {
            const btn = document.createElement('button');
            btn.className = 'bottle';
            btn.innerText = bottle.id;

            if (showPoisonHighlight && bottle.isPoison) {
                btn.classList.add('poison-placed');
            }

            if (!showPoisonHighlight && bottle.clicked) {
                btn.classList.add(bottle.isPoison ? 'poison-revealed' : 'safe-revealed');
                btn.innerText = bottle.isPoison ? 'ZEHİR' : 'TEMİZ';
            }

            if (editable) btn.onclick = bottle.onClickHandler;
            grid.appendChild(btn);
        });
    }

    function setConfirmVisible(t1, t2) {
        el.confirmT1.style.display = t1 ? 'block' : 'none';
        el.confirmT2.style.display = t2 ? 'block' : 'none';
    }

    function setConfirmEnabled(t1, t2) {
        el.confirmT1.disabled = !t1;
        el.confirmT2.disabled = !t2;
    }

    function setPanelBlur(t1, t2) {
        el.panelT1.classList.toggle('blurred', t1);
        el.panelT2.classList.toggle('blurred', t2);
    }

    function setPanelActive(t1, t2) {
        el.panelT1.classList.toggle('active', t1);
        el.panelT2.classList.toggle('active', t2);
    }

    return {
        showGameScreen, showOverlay, hideOverlay,
        setStatus, setTimer, setQuestion, setEndMessage,
        renderChoices, renderBottleGrid,
        setConfirmVisible, setConfirmEnabled,
        setPanelBlur, setPanelActive
    };
})();


/* ═══════════════════════════════════════════════════════════════════
   GAME MODULE
   Orchestrates Settings, Questions, and UI. Owns all game state.
═══════════════════════════════════════════════════════════════════ */
const Game = (() => {
    const BOTTLE_COUNT = 20;

    // ── State ──────────────────────────────────────────────────────
    let poisonLimit  = 0;
    let questionTime = 0;
    let setupStep    = 1;   // 1 = T1 places on T2, 2 = T2 places on T1, 3 = play
    let activeTurn   = 1;   // 1 or 2
    let timerInterval = null;
    let grids = { t1: [], t2: [] };

    // ── Bottle factory ─────────────────────────────────────────────
    function makeBottles(teamKey) {
        return Array.from({ length: BOTTLE_COUNT }, (_, i) => ({
            id: i + 1,
            isPoison: false,
            clicked: false,
            get onClickHandler() { return () => handleClick(teamKey, i); }
        }));
    }

    // ── Init ───────────────────────────────────────────────────────
    function init() {
        if (!Settings.isReady()) { alert('Seçimleri tamamlayın!'); return; }

        const cfg = Settings.get();
        poisonLimit  = cfg.poisonCount;
        questionTime = cfg.questionTime;
        setupStep    = 1;
        activeTurn   = 1;
        grids.t1     = makeBottles('t1');
        grids.t2     = makeBottles('t2');

        UI.showGameScreen();
        _renderSetup();
    }

    // ── Setup rendering ────────────────────────────────────────────
    function _renderSetup() {
        if (setupStep === 1) {
            UI.setStatus('2. TAKIM ARKASINI DÖNSÜN! 1. Takım rakibi için zehir yerleştiriyor.');
            UI.setPanelBlur(true, false);
            UI.setConfirmVisible(false, true);
            UI.renderBottleGrid('t1', grids.t1, false, false);
            UI.renderBottleGrid('t2', grids.t2, true,  true);

        } else if (setupStep === 2) {
            UI.setStatus('1. TAKIM ARKASINI DÖNSÜN! 2. Takım rakibi için zehir yerleştiriyor.');
            UI.setPanelBlur(false, true);
            UI.setConfirmVisible(true, false);
            UI.renderBottleGrid('t1', grids.t1, true,  true);
            UI.renderBottleGrid('t2', grids.t2, false, false);

        } else {
            UI.setStatus('OYUN BAŞLADI! SIRA: 1. TAKIM (Kendi panondan temiz şişe seç!)', '#2980b9');
            UI.setPanelBlur(false, false);
            UI.setConfirmVisible(false, false);
            UI.setPanelActive(true, false);
            _renderPlay();
        }
        _updateConfirm();
    }

    function _renderPlay() {
        UI.renderBottleGrid('t1', grids.t1, true, false);
        UI.renderBottleGrid('t2', grids.t2, true, false);
    }

    // ── Click dispatcher ───────────────────────────────────────────
    function handleClick(teamKey, index) {
        if (setupStep < 3) _setupClick(teamKey, index);
        else               _playClick(teamKey, index);
    }

    function _setupClick(teamKey, index) {
        const bottle  = grids[teamKey][index];
        const grid    = grids[teamKey];
        const placed  = grid.filter(b => b.isPoison).length;

        if      (!bottle.isPoison && placed < poisonLimit) bottle.isPoison = true;
        else if  (bottle.isPoison)                         bottle.isPoison = false;

        // Re-render only the active editing grid
        const activeKey = setupStep === 1 ? 't2' : 't1';
        UI.renderBottleGrid(activeKey, grids[activeKey], true, true);
        _updateConfirm();
    }

    function _playClick(teamKey, index) {
        const myKey = activeTurn === 1 ? 't1' : 't2';
        if (teamKey !== myKey) {
            alert('Sıra sende! Lütfen kendi panondaki şişelerden birini seç.');
            return;
        }

        const bottle = grids[teamKey][index];
        if (bottle.clicked) return;
        bottle.clicked = true;
        _renderPlay();

        if (bottle.isPoison) {
            const left = grids[teamKey].filter(b => b.isPoison && !b.clicked).length;
            if (left === 0) _endGame('Kendi panondaki son zehri buldun!');
            else            _showQuestion();
        } else {
            _switchTurn();
        }
    }

    // ── Turn ───────────────────────────────────────────────────────
    function _switchTurn() {
        activeTurn = activeTurn === 1 ? 2 : 1;
        UI.setStatus('SIRA: ' + activeTurn + '. TAKIM (Sıra sende, kendi şişeni seç!)', '#2980b9');
        UI.setPanelActive(activeTurn === 1, activeTurn === 2);
    }

    // ── Setup confirm ──────────────────────────────────────────────
    function confirmSetup() {
        setupStep++;
        _renderSetup();
    }

    function _updateConfirm() {
        const t1Ready = grids.t1.filter(b => b.isPoison).length === poisonLimit;
        const t2Ready = grids.t2.filter(b => b.isPoison).length === poisonLimit;
        UI.setConfirmEnabled(t1Ready, t2Ready);
    }

    // ── Question ───────────────────────────────────────────────────
    function _showQuestion() {
        const { text, answer } = Questions.getRandom();
        const choices = Questions.buildChoices(answer);

        UI.showOverlay('question');
        UI.setQuestion(text);
        UI.renderChoices(choices, picked => {
            if (picked === answer) {
                _stopTimer();
                UI.hideOverlay('question');
                _switchTurn();
            } else {
                _endGame('Yanlış cevap!');
            }
        });
        _startTimer();
    }

    function _startTimer() {
        let remaining = questionTime;
        UI.setTimer(remaining);
        _stopTimer();
        timerInterval = setInterval(() => {
            remaining--;
            UI.setTimer(remaining);
            if (remaining <= 0) _endGame('Süre bitti!');
        }, 1000);
    }

    function _stopTimer() {
        clearInterval(timerInterval);
        timerInterval = null;
    }

    // ── End ────────────────────────────────────────────────────────
    function _endGame(reason) {
        _stopTimer();
        UI.hideOverlay('question');
        const winner = activeTurn === 1 ? '2. TAKIM' : '1. TAKIM';
        UI.setEndMessage(reason + ' Kazanan: ' + winner);
        UI.showOverlay('end');
    }

    // ── Public ─────────────────────────────────────────────────────
    return { init, confirmSetup };
})();

</script>
</body>
</html>
